<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>З 8 Березня! 🌷</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body id="body">
    <div class="bg-eight">8</div>

    <div class="main-card" id="mainCard">
        <div id="heart-eight-container" class="eight-dynamic"></div>

        <div class="photo-stack">
            <div class="card-photo p1"><img src="ph1.jpg" alt="1"></div>
            <div class="card-photo p2"><img src="ph2.jpg" alt="2"></div>
            <div class="card-photo p3"><img src="ph3.jpg" alt="3"></div>
        </div>

        <div class="content">
            <h1 class="title">Вітаю з 8 Березня! Бажаю море квітів, щирих компліментів та здійснення найзаповітніших мрій.</h1>
            <div class="text-box">
                <p id="main-text">Ти — найпрекрасніша квітка цієї весни! 🌷</p>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-cats" id="giftBtn">Кото-десант 🐈</button>
            <button class="btn btn-surprise" id="surpriseBtn">Сюрприз 🎁</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
